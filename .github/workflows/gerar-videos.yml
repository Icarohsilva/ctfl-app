name: Gerar e publicar vídeos

on:
  push:
    branches:
      - main
    paths:
      - src/data/conteudo-topicos.ts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Piper TTS
        uses: actions/cache@v4
        with:
          path: |
            scripts/piper
            scripts/piper-models
          key: piper-2023.11.14-pt-BR-faber-medium

      - name: Download Piper TTS
        run: |
          if [ ! -f scripts/piper/piper ]; then
            mkdir -p scripts/piper
            wget -q "https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz" \
              -O /tmp/piper.tar.gz
            tar -xzf /tmp/piper.tar.gz -C scripts/
            chmod +x scripts/piper/piper
          fi
          mkdir -p scripts/piper-models
          if [ ! -f scripts/piper-models/pt_BR-faber-medium.onnx ]; then
            wget -q "https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/faber/medium/pt_BR-faber-medium.onnx" \
              -O scripts/piper-models/pt_BR-faber-medium.onnx
            wget -q "https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/faber/medium/pt_BR-faber-medium.onnx.json" \
              -O scripts/piper-models/pt_BR-faber-medium.onnx.json
          fi

      - name: Limpar artefatos anteriores
        run: rm -f scripts/video-urls-new.json

      - name: Export content to JSON
        run: npx tsx scripts/exportar-conteudo.ts

      - name: Generate videos
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/gerar-videos.py

      - name: Inject URLs
        run: node scripts/injetar-urls.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/video-urls.ts
          if ! git diff --staged --quiet; then
            git commit -m "chore: atualiza urls de vídeo [skip ci]"
            for i in 1 2 3; do
              git push origin HEAD:main && break
              echo "Push falhou (tentativa $i/3), aguardando 15s..."
              sleep 15
            done
          else
            echo "Nenhuma URL nova para commitar."
          fi
