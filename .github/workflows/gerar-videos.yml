name: Gerar e publicar vídeos

on:
  push:
    branches:
      - main
    paths:
      - src/data/conteudo-topicos.ts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Limpar artefatos anteriores
        run: rm -f scripts/video-urls-new.json

      - name: Export content to JSON
        run: npx tsx scripts/exportar-conteudo.ts

      - name: Generate videos
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/gerar-videos.py

      - name: Inject URLs
        run: node scripts/injetar-urls.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/video-urls.ts
          if ! git diff --staged --quiet; then
            git commit -m "chore: atualiza urls de vídeo [skip ci]"
            git push origin HEAD:main
          else
            echo "Nenhuma URL nova para commitar."
          fi
